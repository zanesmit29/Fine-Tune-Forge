kind = "web"
previewPath = "/"
title = "FineTuneForge"
version = "1.0.0"
id = "artifacts/finetuneforge"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19527

[services.development]
run = "pnpm --filter @workspace/finetuneforge run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finetuneforge", "run", "build" ]
publicDir = "artifacts/finetuneforge/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19527"
BASE_PATH = "/"
